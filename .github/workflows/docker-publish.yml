name: Publish Docker Images to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./flow-agent
          push: true
          tags: akashyadav758/flow-agent-studio-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: akashyadav758/flow-agent-studio-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Chrome Image
        uses: docker/build-push-action@v5
        with:
          context: ./Browser-Agent
          push: true
          tags: akashyadav758/flow-agent-studio-chrome:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
